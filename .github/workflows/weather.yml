name: BBC Weather Scraper

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:         # allows manual runs

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r london_bbc_weather/requirements.txt

      - name: Run script
        run: python london_bbc_weather/collect_snapshots.py

      - name: Commit and push data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add london_bbc_weather/data/
          git commit -m "Update weather data" || echo "No changes"
          git push